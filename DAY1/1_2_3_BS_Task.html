<!DOCTYPE html>
<html>
<head>
    <title>DK Cafe</title>

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>


<div class="container mt-4">

    
    <h1 class="text-center text-primary mb-3">DK Cafe</h1>
    <p class="text-center mb-4">Welcome to DK Cafe. Enjoy coffee and snacks</p>

    <div class="row">

        <div class="col-lg-4 col-12 p-3 border">
            <h4>Coffee</h4>
            <p>Hot coffee and cold coffee .</p>
        </div>

        <div class="col-lg-4 col-12 p-3 border">
            <h4>Special Items</h4>

            <div class="row mt-2">
                <div class="col-6 bg-light p-2">Tea</div>
                <div class="col-6 bg-secondary text-white p-2">Snacks</div>
            </div>

        </div>

        <div class="col-lg-4 col-12 p-3 border">
            <h4>Desserts</h4>
            <p>Cakes and ice cream </p>
        </div>

    </div>


    <div class="mt-4 p-3 bg-dark text-white text-center">
        Thank you for visiting DK Cafe.
    </div>

</div>

</body>
</html>
